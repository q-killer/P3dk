<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P3dK V39 - Dev Environment</title>
    <!-- CSS will be injected here by the linker later -->
    <style>body { margin: 0; overflow: hidden; background: #020008; }</style>
    
    <!-- CDN Dependencies: Let the browser cache handle the heavy lifting -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- OrbitControls for dev -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <!-- Note: Manifold3D will be loaded asynchronously in manifold.js -->
</head>
<body>
    <div id="ui">
        <!-- UI modules will be dynamically injected here -->
    </div>
    
    <!-- ES Module Entry Point -->
    <script type="module" src="./src/core.js"></script>
</body>
</html>
